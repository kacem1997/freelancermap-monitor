name: Freelancermap Monitor

on:
  schedule:
    # Alle 5 Minuten (GitHub garantiert keine Minutengenauigkeit,
    # in der Praxis läuft es 5–15 Minuten nach dem Schedule)
    - cron: "*/5 * * * *"
  # Manuell auslösbar zum Testen
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Monitor ausführen
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python monitor.py

      - name: Seen-Liste committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_postings.json
          # Nur committen wenn sich die Datei geändert hat (= neue Projekte gefunden)
          git diff --staged --quiet || git commit -m "chore: update seen postings [skip ci]"
          git push
