name: Freelancermap Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Verhindert parallele Runs — neuer Run wartet bis laufender fertig ist
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Monitor ausführen
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Seen-Liste committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add seen_postings.json
          git diff --staged --quiet || git commit -m "chore: update seen postings [skip ci]"
          git push
